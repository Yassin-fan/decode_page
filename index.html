<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Optical Rx — V8 (Anti-Moiré)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#eee;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#cam,#overlay{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
#hud{position:absolute;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(transparent,rgba(0,0,0,.95));z-index:10;display:flex;flex-direction:column;gap:8px}
#status{font-size:16px;font-weight:bold;color:#0f0}
#bar-wrap{height:10px;background:#333;border-radius:5px;overflow:hidden}
#bar{height:100%;background:#0f0;width:0;transition:width .2s}
#info{display:flex;justify-content:space-between;font-size:14px;font-weight:bold}
#missing{color:#ffaa00;font-size:13px;font-weight:bold;max-height:90px;overflow-y:auto;word-break:break-word}
select{padding:8px;background:#222;color:#fff;border:1px solid #555;border-radius:4px;width:100%}
button{padding:14px;font-size:18px;border:none;border-radius:8px;background:#0a0;color:#000;cursor:pointer;font-weight:bold;width:100%}
button:disabled{background:#333;color:#666}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="hud">
  <div id="status">正在启动摄像头…</div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="info"><span id="frames">0 / 0</span></div>
  <div id="missing"></div> 
  <select id="camSel"></select>
  <button id="dl" disabled>下载文件</button>
</div>

<script>
// ================= V8 防弹配置 =================
const C = 45, MOAT = 1, PAD = 2;
const TOTAL_C = C + MOAT * 2 + PAD * 2;
let totalF = null, rx = {}, stream = null, live = false, rid = null;
let devices = [], curDev = null;

const E = id => document.getElementById(id);
const video = E('cam'), overlay = E('overlay'), octx = overlay.getContext('2d');
const status = E('status'), bar = E('bar'), framesE = E('frames');
const missingE = E('missing'), dlBtn = E('dl'), camSel = E('camSel');

async function enumCams(){
  try {
    devices = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
    camSel.innerHTML = '';
    devices.forEach((d, i) => {
      let o = document.createElement('option');
      o.value = d.deviceId; o.textContent = d.label || 'Camera ' + (i + 1);
      camSel.appendChild(o);
    });
    
    if (devices.length > 0) { 
      let savedCam = localStorage.getItem('preferred_cam');
      if (savedCam && devices.find(d => d.deviceId === savedCam)) {
          curDev = savedCam;
      } else {
          let backCam = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('environment'));
          curDev = backCam ? backCam.deviceId : devices[0].deviceId; 
      }
      camSel.value = curDev; 
    }
  } catch(e) { status.textContent = '设备枚举失败: ' + e.message; }
}

async function startCam(deviceId){
  if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  
  let videoConstraints = {
    facingMode: 'environment',
    width: { ideal: 1280 },
    height: { ideal: 720 },
    advanced: [{ focusMode: "continuous" }]
  };
  if(deviceId) videoConstraints.deviceId = { exact: deviceId };

  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false });
    video.srcObject = stream; await video.play();
    status.textContent = '扫描中... (V8 抗噪护盾已开启)';
    status.style.color = '#0f0';
    live = true; requestAnimationFrame(loop);
  } catch(e) {
    try {
        let safeConstraints = { facingMode: 'environment' };
        if(deviceId) safeConstraints.deviceId = { exact: deviceId };
        stream = await navigator.mediaDevices.getUserMedia({ video: safeConstraints, audio: false });
        video.srcObject = stream; await video.play();
        status.textContent = '扫描中... (标准模式)';
        status.style.color = '#0f0';
        live = true; requestAnimationFrame(loop);
    } catch(e2) { status.textContent = '摄像头错误: ' + e2.message; }
  }
}

camSel.onchange = function() { 
    curDev = camSel.value; 
    localStorage.setItem('preferred_cam', curDev);
    startCam(curDev); 
};

function processFrame(pixels, w, h) {
    let minSum = 1e9, maxSum = -1e9, minDiff = 1e9, maxDiff = -1e9;
    let tl = null, tr = null, bl = null, br = null, cyan = 0;

    for(let y=0; y<h; y+=4) {
        for(let x=0; x<w; x+=4) {
            let i = (y * w + x) * 4;
            if (pixels[i] < 100 && pixels[i+1] > 130 && pixels[i+2] > 130) {
                cyan++;
                let sum = x + y, diff = x - y;
                if(sum < minSum) { minSum = sum; tl = {x, y}; }
                if(sum > maxSum) { maxSum = sum; br = {x, y}; }
                if(diff < minDiff) { minDiff = diff; bl = {x, y}; }
                if(diff > maxDiff) { maxDiff = diff; tr = {x, y}; }
            }
        }
    }

    if (cyan < 15 || !tl || !tr || !bl || !br) return null;
    let dx = tr.x - tl.x, dy = tr.y - tl.y;
    if (Math.sqrt(dx*dx + dy*dy) < 50) return null;

    octx.strokeStyle = '#0f0'; octx.lineWidth = 4; octx.beginPath();
    octx.moveTo(tl.x, tl.y); octx.lineTo(tr.x, tr.y);
    octx.lineTo(br.x, br.y); octx.lineTo(bl.x, bl.y);
    octx.closePath(); octx.stroke();

    let rawGrays = [];
    for(let row=0; row<C; row++) {
        for(let col=0; col<C; col++) {
            // 跳过青色边框(PAD)和黑色隔离带(MOAT)
            let u = (col + PAD + MOAT + 0.5) / TOTAL_C;
            let v = (row + PAD + MOAT + 0.5) / TOTAL_C;
            let tx = tl.x + u*(tr.x - tl.x), ty = tl.y + u*(tr.y - tl.y);
            let bx = bl.x + u*(br.x - bl.x), by = bl.y + u*(br.y - bl.y);
            let px = Math.round(tx + v*(bx - tx)), py = Math.round(ty + v*(by - ty));
            
            // 核心黑科技：3x3 矩阵抗噪采样，彻底无视摩尔纹和光斑
            let graySum = 0, validCount = 0;
            for(let dy=-1; dy<=1; dy++){
                for(let dx=-1; dx<=1; dx++){
                    let nx = px+dx, ny = py+dy;
                    if(nx>=0 && nx<w && ny>=0 && ny<h) {
                        let i = (ny * w + nx) * 4;
                        graySum += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                        validCount++;
                    }
                }
            }
            if(validCount > 0) {
                rawGrays.push(graySum / validCount);
            } else {
                rawGrays.push(-1);
            }
        }
    }

    let minG = 255, maxG = 0;
    for(let g of rawGrays) {
        if(g !== -1) {
            if(g < minG) minG = g;
            if(g > maxG) maxG = g;
        }
    }
    let threshold = (maxG - minG > 30) ? (minG + maxG) / 2 : 128;

    let bits = [];
    for(let g of rawGrays) {
        if (g === -1) bits.push(0);
        else bits.push(g > threshold ? 1 : 0);
    }

    // ================= 容量组合 =================
    let bytes = new Uint8Array(253);
    for(let i=0; i<253; i++) {
        let b = 0;
        for(let j=0; j<8; j++) b = (b<<1) | (bits[i*8+j]||0);
        bytes[i] = b;
    }

    let frame_data = bytes.slice(0, 249);
    let expected_crc = ((bytes[249]<<24) | (bytes[250]<<16) | (bytes[251]<<8) | bytes[252]) >>> 0;
    
    let calc_crc = 0xFFFFFFFF;
    for(let i=0; i<frame_data.length; i++) {
        calc_crc ^= frame_data[i];
        for(let j=0; j<8; j++) {
            calc_crc = (calc_crc & 1) ? (0xEDB88320 ^ (calc_crc >>> 1)) : (calc_crc >>> 1);
        }
    }
    calc_crc = (calc_crc ^ 0xFFFFFFFF) >>> 0;

    if (calc_crc !== expected_crc) return "CRC_ERROR"; 

    let idx = (frame_data[0]<<8) | frame_data[1];
    let total = (frame_data[2]<<8) | frame_data[3];
    if (idx >= total || total < 1 || total > 9999) return null;
    
    return { index: idx, total, payload: frame_data.slice(4) };
}

function updateMissing(got, total) {
    if (got < total) {
        let missing = [];
        for (let i = 0; i < total; i++) {
            if (!rx[i]) missing.push(i + 1);
        }
        missingE.textContent = missing.length === 0 ? '' : `待补漏帧: ${missing.join(', ')}`;
    } else {
        missingE.textContent = '';
    }
}

function reassemble(){
  if(totalF===null) return null;
  let parts=[];
  for(let i=0; i<totalF; i++){ if(!rx[i]) return null; parts.push(rx[i]); }
  let tLen=0; for(let p of parts) tLen+=p.length;
  let merged=new Uint8Array(tLen), off=0;
  for(let p of parts){ merged.set(p, off); off+=p.length; }
  
  // 校验魔数 0xAB 0x08
  if(merged[0]!==0xAB || merged[1]!==0x08) { status.textContent='校验头损坏 (请确保电脑运行的是 V8 代码)'; return null; }
  let nameLen = (merged[2]<<8) | merged[3];
  let fname = new TextDecoder().decode(merged.slice(4, 4+nameLen));
  let raw;
  try { raw = window.pako.inflate(merged.slice(4+nameLen)); }
  catch(e) { status.textContent='解压失败: '+e.message; return null; }
  return { filename: fname, data: raw };
}

function dlFile(file){
  let blob = new Blob([file.data], {type:'application/octet-stream'});
  let url = URL.createObjectURL(blob), a = document.createElement('a');
  a.href = url; a.download = file.filename; document.body.appendChild(a);
  a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function loop(){
  if(!live) return;
  rid = requestAnimationFrame(loop);

  let vw = video.videoWidth, vh = video.videoHeight;
  if(!vw || !vh) return;
  overlay.width = vw; overlay.height = vh;
  
  octx.clearRect(0, 0, vw, vh);
  octx.drawImage(video, 0, 0, vw, vh);
  
  let pix = octx.getImageData(0, 0, vw, vh).data;
  let result = processFrame(pix, vw, vh);
  
  if(result === "CRC_ERROR") {
      status.textContent = '❌ 画面冲突 (轻微移动手机避开光斑)';
      status.style.color = '#ffaa00';
      return;
  }
  if(!result) return;
  
  let {index, total, payload} = result;
  if(totalF===null) { totalF = total; } else if(totalF!==total) return;

  if(!rx[index]) {
      rx[index] = payload;
      let got = Object.keys(rx).length, pct = Math.round(got/totalF*100);
      bar.style.width = pct+'%'; 
      framesE.textContent = `${got} / ${totalF}`;
      updateMissing(got, totalF); 
  }
  
  status.textContent = `✅ 成功截获: 第 ${index + 1} 帧`;
  status.style.color = '#0f0';

  if(Object.keys(rx).length >= totalF){
    status.textContent = '🎉 全部接收完毕！数据校验通过。';
    status.style.color = '#0f0';
    live = false; cancelAnimationFrame(rid);
    octx.clearRect(0, 0, vw, vh); 
    if(stream) stream.getTracks().forEach(t => t.stop());
    let file = reassemble();
    if(file){
      dlBtn.disabled = false; dlBtn.style.background = '#0f0';
      dlBtn.textContent = '下载文件: ' + file.filename;
      dlBtn.onclick = () => dlFile(file);
      if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }
}

enumCams().then(()=>startCam(curDev));
</script>
</body>
</html>
