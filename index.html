<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Optical Rx — Decoder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;height:100dvh;
display:flex;flex-direction:column;overflow:hidden}
#cam, #overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain; /* 关键：改成 contain，保持物理比例，绝不拉伸和裁切 */
}
#hud{position:absolute;bottom:0;left:0;right:0;padding:16px;
background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:10}
#status{font-size:14px;opacity:.8;margin-bottom:6px}
#bar-wrap{height:6px;background:#333;border-radius:3px;overflow:hidden;margin-bottom:4px}
#bar{height:100%;background:#0f0;width:0;transition:width .3s}
#info{display:flex;justify-content:space-between;font-size:12px;opacity:.7}
button{display:block;margin:12px auto 0;padding:12px 32px;font-size:16px;
border:none;border-radius:8px;background:#0a0;color:#000;cursor:pointer;font-weight:600}
button:disabled{background:#333;color:#666}
#log{position:absolute;top:8px;right:8px;z-index:10;font-size:11px;opacity:.6;
max-width:140px;text-align:right;line-height:1.4}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="log"></div>
<div id="hud">
  <div id="status">Starting camera…</div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="info"><span id="frames"></span><span id="sz"></span></div>
  
  <select id="camSel" style="display:block; margin: 8px auto; padding: 4px; border-radius: 4px; background: #333; color: white; border: 1px solid #555;"></select>
  
  <button id="dl" disabled>Download file</button>
</div>

<script>
/* ================================================================
   OPTICAL RECEIVE v2 — improved grid detection + camera selector
   ================================================================ */

const C={CELLS:33,FINDER:3,CAP:231,SCAN_MS:120,COOL_MS:350};
const COLOURS=[{r:0,g:0,b:0},{r:210,g:0,b:0},{r:0,g:170,b:0},{r:0,g:0,b:230}];

let totalF=null, rx={}, lastCap={}, stream=null, live=false, rid=null;
let devices=[], curDev=null;

const E=id=>document.getElementById(id);
const video=E('cam'),overlay=E('overlay'),octx=overlay.getContext('2d');
const status=E('status'),bar=E('bar'),framesE=E('frames'),szE=E('sz');
const dlBtn=E('dl'),logEl=E('log'),camSel=E('camSel');

function cDist(a,b){let dr=a.r-b.r,dg=a.g-b.g,db=a.b-b.b;return dr*dr+dg*dg+db*db}
function classify(r,g,b){let best=0,bd=1e9;for(let i=0;i<4;i++){let d=cDist(COLOURS[i],{r,g,b});if(d<bd){bd=d;best=i}}return best}
function log(m){logEl.textContent=m;console.log(m)}

/* ---- Camera enumeration ---- */
async function enumCams(){
  try{
    devices=(await navigator.mediaDevices.enumerateDevices()).filter(d=>d.kind==='videoinput');
    camSel.innerHTML='';
    devices.forEach((d,i)=>{
      let o=document.createElement('option');
      o.value=d.deviceId;
      o.textContent=d.label||'Camera '+(i+1);
      camSel.appendChild(o);
    });
    if(devices.length>0){curDev=devices[0].deviceId;camSel.value=curDev}
    status.textContent=devices.length+' camera(s) found';
  }catch(e){status.textContent='Enum error: '+e.message}
}

async function startCam(deviceId){
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  status.textContent='Starting camera...';
  let constraints={video:{facingMode:'environment'},audio:false};
  if(deviceId)constraints.video={deviceId:{exact:deviceId}};
  // 删掉原本强制宽高，让手机自动分配原生比例 if(!deviceId){constraints.video.width={ideal:1280};constraints.video.height={ideal:720}}
  try{
    stream=await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject=stream;
    await video.play();
    status.textContent='Point camera at screen';
    live=true;
    requestAnimationFrame(loop);
  }catch(e){
    status.textContent='Camera error: '+e.message;
    if(!deviceId){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
        video.srcObject=stream;await video.play();
        status.textContent='Camera OK (fallback)';
        live=true;requestAnimationFrame(loop);
      }catch(e2){status.textContent='Both camera attempts failed'}
    }
  }
}

window.switchCam=function(){
  if(devices.length<2){status.textContent='Only one camera';return}
  let idx=devices.findIndex(d=>d.deviceId===curDev);
  idx=(idx+1)%devices.length;
  curDev=devices[idx].deviceId;
  camSel.value=curDev;
  startCam(curDev);
};

camSel.onchange=function(){curDev=camSel.value;startCam(curDev)};

/* ---- Improved grid detection ---- */
function findGridCorners(pixels,w,h){
  let sum=0,count=0;
  for(let y=0;y<h;y+=2){
    for(let x=0;x<w;x+=2){
      let i=(y*w+x)*4;
      sum+=pixels[i];count++;
    }
  }
  let avg=sum/count;
  let DARK=Math.min(avg*0.4,80);

  let left=-1,right=-1,top=-1,bottom=-1;

  for(let x=0;x<w;x++){
    let dark=0,total=0;
    for(let y=0;y<h;y++){let i=(y*w+x)*4;if(pixels[i]<DARK)dark++;total++}
    if(dark>total*0.25){left=x;break}
  }
  if(left<0)return null;

  for(let x=w-1;x>=0;x--){
    let dark=0,total=0;
    for(let y=0;y<h;y++){let i=(y*w+x)*4;if(pixels[i]<DARK)dark++;total++}
    if(dark>total*0.25){right=x;break}
  }
  if(right<0||right-left<40)return null;

  for(let y=0;y<h;y++){
    let dark=0,total=0;
    for(let x=left;x<=right;x++){let i=(y*w+x)*4;if(pixels[i]<DARK)dark++;total++}
    if(dark>total*0.25){top=y;break}
  }
  if(top<0)return null;

  for(let y=h-1;y>=0;y--){
    let dark=0,total=0;
    for(let x=left;x<=right;x++){let i=(y*w+x)*4;if(pixels[i]<DARK)dark++;total++}
    if(dark>total*0.25){bottom=y;break}
  }
  if(bottom<0||bottom-top<40)return null;

  let gw=right-left,gh=bottom-top;
  if(gw<40||gh<40||gw/gh>2||gh/gw>2)return null;

  let cellPx=gw/C.CELLS;
  if(cellPx<1.5)return null;

  let finderCenters=[
    {cx:left+2.5*cellPx,cy:top+2.5*cellPx},
    {cx:left+30.5*cellPx,cy:top+2.5*cellPx},
    {cx:left+2.5*cellPx,cy:top+30.5*cellPx},
    {cx:left+30.5*cellPx,cy:top+30.5*cellPx},
  ];

  let foundFinders=0;
  for(let f of finderCenters){
    let cx=Math.round(f.cx),cy=Math.round(f.cy);
    if(cx<0||cx>=w||cy<0||cy>=h)continue;
    let ci=(cy*w+cx)*4;
    let cr=pixels[ci];
    let ringDark=0,ringTotal=0;
    let r=Math.round(cellPx*1.2);
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        if(Math.abs(dx)<r*0.3&&Math.abs(dy)<r*0.3)continue;
        let sx=cx+dx,sy=cy+dy;
        if(sx<0||sx>=w||sy<0||sy>=h)continue;
        let si=(sy*w+sx)*4;
        if(pixels[si]<DARK)ringDark++;
        ringTotal++;
      }
    }
    if(cr>120&&ringTotal>0&&ringDark/ringTotal>0.4)foundFinders++;
  }

  if(foundFinders<3){log('Finders: '+foundFinders+'/4');return null}

  return{left,top,right,bottom,w:gw,h:gh};
}

function decodeFrame(pixels,w,h){
  let corners=findGridCorners(pixels,w,h);
  if(!corners)return null;

  let{left,top}=corners;
  let gw=corners.right-left,gh=corners.bottom-top;
  let cellSize=gw/C.CELLS;
  if(cellSize<1.5)return null;

  let innerSide=C.CELLS-2;
  let usable=innerSide*innerSide-4*C.FINDER*C.FINDER;

  let bits=[];
  let halfC=Math.max(1,Math.floor(cellSize/4));

  for(let row=1;row<=innerSide;row++){
    for(let col=1;col<=innerSide;col++){
      let isF=(row<=C.FINDER&&col<=C.FINDER)||
              (row<=C.FINDER&&col>innerSide-C.FINDER)||
              (row>innerSide-C.FINDER&&col<=C.FINDER)||
              (row>innerSide-C.FINDER&&col>innerSide-C.FINDER);
      if(isF)continue;

      let cx=Math.round(left+(col+0.5)*cellSize);
      let cy=Math.round(top+(row+0.5)*cellSize);
      let sr=0,sg=0,sb=0,sc=0;
      for(let dy=-halfC;dy<=halfC;dy++){
        for(let dx=-halfC;dx<=halfC;dx++){
          let sx=cx+dx,sy=cy+dy;
          if(sx<0||sx>=w||sy<0||sy>=h)continue;
          let i=(sy*w+sx)*4;
          sr+=pixels[i];sg+=pixels[i+1];sb+=pixels[i+2];sc++;
        }
      }
      if(sc===0){bits.push(0);continue}
      let val=classify(Math.round(sr/sc),Math.round(sg/sc),Math.round(sb/sc));
      bits.push(val);
    }
  }

  let bytes=new Uint8Array(C.CAP);
  for(let i=0;i<Math.min(bits.length,C.CAP*4);i+=4){
    let b0=bits[i]||0,b1=bits[i+1]||0,b2=bits[i+2]||0,b3=bits[i+3]||0;
    bytes[i>>2]=(b0<<6)|(b1<<4)|(b2<<2)|b3;
  }

  let idx=(bytes[0]<<8)|bytes[1];
  let total=(bytes[2]<<8)|bytes[3];
  if(idx>=total||total<1||total>9999)return null;

  return{index:idx,total,payload:bytes.slice(4)};
}

/* ---- Reassembly ---- */
function reassemble(){
  if(totalF===null)return null;
  let N=totalF,parts=[];
  for(let i=0;i<N;i++){if(!rx[i])return null;parts.push(rx[i])}
  let tLen=0;for(let p of parts)tLen+=p.length;
  let merged=new Uint8Array(tLen),off=0;
  for(let p of parts){merged.set(p,off);off+=p.length}
  if(merged[0]!==0xAB||merged[1]!==0x01){status.textContent='Bad session header';return null}
  let nameLen=(merged[2]<<8)|merged[3];
  let fname=new TextDecoder().decode(merged.slice(4,4+nameLen));
  let raw;
  try{raw=pako.inflate(merged.slice(4+nameLen))}
  catch(e){status.textContent='Decompress error: '+e.message;return null}
  return{filename:fname,data:raw};
}

function dlFile(file){
  let blob=new Blob([file.data],{type:'application/octet-stream'});
  let url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=file.filename;document.body.appendChild(a);
  a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  status.textContent='Downloaded: '+file.filename+' ('+file.data.length+'B)';
}

/* ---- Main loop ---- */
let lastScan=0;
function loop(ts){
  if(!live)return;
  rid=requestAnimationFrame(loop);
  if(ts-lastScan<C.SCAN_MS)return;
  lastScan=ts;

  let vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh)return;
  overlay.width=vw;overlay.height=vh;

  octx.drawImage(video,0,0,vw,vh);
  let img=octx.getImageData(0,0,vw,vh);
  let pix=img.data;

  let result=decodeFrame(pix,vw,vh);

  let corners=findGridCorners(pix,vw,vh);
  if(corners){
    octx.strokeStyle=result?'#0f0':'#f84';
    octx.lineWidth=3;
    octx.strokeRect(corners.left,corners.top,corners.right-corners.left,corners.bottom-corners.top);
  }

  if(!result)return;
  let{index,total,payload}=result;

  if(totalF===null){totalF=total;status.textContent='Grid: '+total+' frame(s)'}
  else if(totalF!==total)return;

  let now=Date.now();
  if(lastCap[index]&&now-lastCap[index]<C.COOL_MS)return;
  lastCap[index]=now;
  rx[index]=payload;

  let got=Object.keys(rx).length;
  let pct=Math.round(got/totalF*100);
  bar.style.width=pct+'%';
  framesE.textContent=got+'/'+totalF;
  szE.textContent='~'+Math.round(Object.values(rx).reduce((a,b)=>a+b.length,0)/1024)+'KB';
  status.textContent='Frame '+(index+1)+' of '+totalF;

  if(got>=totalF){
    status.textContent='Reassembling...';
    live=false;cancelAnimationFrame(rid);
    if(stream){stream.getTracks().forEach(t=>t.stop())}
    let file=reassemble();
    if(file){
      dlBtn.disabled=false;dlBtn.className='btn btn-on';
      dlBtn.textContent='Download '+file.filename+' ('+file.data.length+'B)';
      dlBtn.onclick=()=>dlFile(file);
      status.textContent='Ready! Tap Download';
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
  }
}

/* ---- Init ---- */
enumCams().then(()=>startCam(curDev));
