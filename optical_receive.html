<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Optical Rx — Decoder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:system-ui,sans-serif;height:100dvh;
display:flex;flex-direction:column;overflow:hidden}
#cam{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%}
#hud{position:absolute;bottom:0;left:0;right:0;padding:16px;
background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:10}
#status{font-size:14px;opacity:.8;margin-bottom:6px}
#bar-wrap{height:6px;background:#333;border-radius:3px;overflow:hidden;margin-bottom:4px}
#bar{height:100%;background:#0f0;width:0;transition:width .3s}
#info{display:flex;justify-content:space-between;font-size:12px;opacity:.7}
button{display:block;margin:12px auto 0;padding:12px 32px;font-size:16px;
border:none;border-radius:8px;background:#0a0;color:#000;cursor:pointer;font-weight:600}
button:disabled{background:#333;color:#666}
#log{position:absolute;top:8px;right:8px;z-index:10;font-size:11px;opacity:.6;
max-width:140px;text-align:right;line-height:1.4}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
<div id="log"></div>
<div id="hud">
  <div id="status">Starting camera…</div>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="info"><span id="frames"></span><span id="sz"></span></div>
  <button id="dl" disabled>Download file</button>
</div>

<script>
// ── Optical Rx — Phone-side decoder ──────────────────────────────────────
// Reads colour-grid frames from a live camera feed, decodes the bitstream,
// decompresses with pako (zlib), and offers the original file for download.
// ─────────────────────────────────────────────────────────────────────────

const CFG = {
  CELLS:       33,      // must match encoder CELLS_PER_SIDE
  CELL_SZ:     16,      // px per cell in source image (for reference)
  FINDER:      3,       // finder size in cells
  PROC_W:      400,     // processing canvas width (downscale for speed)
  SCAN_EVERY:  150,     // ms between decode attempts
  COOLDOWN:    400,     // ms before same-index re-decode
};

// Target colours from the encoder (R,G,B)
const COLOURS = [
  { r:   0, g:   0, b:   0 },  // 00  black
  { r: 210, g:   0, b:   0 },  // 01  red
  { r:   0, g: 170, b:   0 },  // 10  green
  { r:   0, g:   0, b: 230 },  // 11  blue
];

// ── state ────────────────────────────────────────────────────────────────
let totalFrames = null;
const received  = {};          // index → Uint8Array (payload only)
let lastCapture = {};          // index → timestamp (cooldown)
let stream     = null;
let running    = false;
let animId     = null;

const video   = document.getElementById("cam");
const overlay = document.getElementById("overlay");
const octx    = overlay.getContext("2d");
const status  = document.getElementById("status");
const bar     = document.getElementById("bar");
const frames  = document.getElementById("frames");
const sz      = document.getElementById("sz");
const dlBtn   = document.getElementById("dl");
const logEl   = document.getElementById("log");

// ── helpers ──────────────────────────────────────────────────────────────
function colourDist(a, b) {
  const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
  return dr*dr + dg*dg + db*db;
}

function classify(r, g, b) {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < COLOURS.length; i++) {
    const d = colourDist(COLOURS[i], {r,g,b});
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;  // 0-3
}

function log(msg) {
  logEl.textContent = msg;
  console.log(msg);
}

function pad4(n) { return String(n).padStart(4, "0"); }

// ── camera init ──────────────────────────────────────────────────────────
async function startCamera() {
  status.textContent = "Requesting camera…";
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    status.textContent = "Camera ready — point at the screen";
    running = true;
    requestAnimationFrame(loop);
  } catch (e) {
    status.textContent = "Camera error: " + e.message;
  }
}

// ── grid detection ───────────────────────────────────────────────────────
function findGridCorners(gray, w, h) {
  // Simple approach: scan inward from edges to find the black border
  const DARK = 60;

  let left = 0, right = w - 1, top = 0, bottom = h - 1;

  // Find left edge
  for (let x = 0; x < w; x++) {
    let darkCount = 0;
    for (let y = Math.floor(h*0.3); y < Math.floor(h*0.7); y++) {
      const i = (y * w + x) * 4;
      if (gray[i] < DARK) darkCount++;
    }
    if (darkCount > (h * 0.35)) { left = x; break; }
  }

  // Find right edge
  for (let x = w - 1; x >= 0; x--) {
    let darkCount = 0;
    for (let y = Math.floor(h*0.3); y < Math.floor(h*0.7); y++) {
      const i = (y * w + x) * 4;
      if (gray[i] < DARK) darkCount++;
    }
    if (darkCount > (h * 0.35)) { right = x; break; }
  }

  // Find top edge
  for (let y = 0; y < h; y++) {
    let darkCount = 0;
    for (let x = Math.floor(w*0.3); x < Math.floor(w*0.7); x++) {
      const i = (y * w + x) * 4;
      if (gray[i] < DARK) darkCount++;
    }
    if (darkCount > (w * 0.35)) { top = y; break; }
  }

  // Find bottom edge
  for (let y = h - 1; y >= 0; y--) {
    let darkCount = 0;
    for (let x = Math.floor(w*0.3); x < Math.floor(w*0.7); x++) {
      const i = (y * w + x) * 4;
      if (gray[i] < DARK) darkCount++;
    }
    if (darkCount > (w * 0.35)) { bottom = y; break; }
  }

  const gw = right - left, gh = bottom - top;
  if (gw < 60 || gh < 60 || gw > w*0.95 || gh > h*0.95) return null; // too small/large

  return { left, top, right, bottom, w: gw, h: gh };
}

// ── decode a single frame from pixel data ────────────────────────────────
function decodeFrame(pixels, w, h) {
  const corners = findGridCorners(pixels, w, h);
  if (!corners) return null;

  const { left, top, right, bottom } = corners;
  const gw = right - left, gh = bottom - top;
  const cellSize = gw / CFG.CELLS;  // approximate cell size in camera pixels

  if (cellSize < 2) return null; // too small to sample reliably

  const innerSide = CFG.CELLS - 2; // 31
  const usable    = innerSide * innerSide - 4 * CFG.FINDER * CFG.FINDER; // 925
  const byteCount = Math.floor(usable * 2 / 8); // 231

  const bits = [];
  const half = Math.floor(cellSize / 2);

  for (let row = 1; row <= innerSide; row++) {
    for (let col = 1; col <= innerSide; col++) {
      // Skip finder cells
      const isFinder =
        (row <= CFG.FINDER && col <= CFG.FINDER) ||
        (row <= CFG.FINDER && col > innerSide - CFG.FINDER) ||
        (row > innerSide - CFG.FINDER && col <= CFG.FINDER) ||
        (row > innerSide - CFG.FINDER && col > innerSide - CFG.FINDER);
      if (isFinder) continue;

      // Sample centre of cell
      const cx = Math.round(left + (col + 0.5) * cellSize);
      const cy = Math.round(top  + (row + 0.5) * cellSize);

      if (cx < 0 || cx >= w || cy < 0 || cy >= h) {
        bits.push(0); bits.push(0); continue;
      }

      const i = (cy * w + cx) * 4;
      const r = pixels[i], g = pixels[i+1], b = pixels[i+2];
      const val = classify(r, g, b);
      bits.push(val);
    }
  }

  // Convert 2-bit values to bytes
  const bytes = new Uint8Array(byteCount);
  for (let i = 0; i < Math.min(bits.length, byteCount * 4); i += 4) {
    const b0 = bits[i] || 0, b1 = bits[i+1] || 0, b2 = bits[i+2] || 0, b3 = bits[i+3] || 0;
    bytes[Math.floor(i/4)] = (b0 << 6) | (b1 << 4) | (b2 << 2) | b3;
  }

  // Read header: index (uint16 BE) + total (uint16 BE)
  const idx   = (bytes[0] << 8) | bytes[1];
  const total = (bytes[2] << 8) | bytes[3];

  // Validate
  if (idx >= total || total > 9999 || total < 1) return null;

  // Payload = bytes[4..]
  const payload = bytes.slice(4);

  return { index: idx, total, payload };
}

// ── reassemble file ──────────────────────────────────────────────────────
function reassemble() {
  const N = totalFrames;
  if (N === null) return;

  // Concatenate payloads in order
  const parts = [];
  for (let i = 0; i < N; i++) {
    if (!received[i]) return; // missing frame
    parts.push(received[i]);
  }

  // Concatenate
  let totalLen = 0;
  for (const p of parts) totalLen += p.length;
  const merged = new Uint8Array(totalLen);
  let off = 0;
  for (const p of parts) {
    merged.set(p, off);
    off += p.length;
  }

  // Parse session header
  // byte 0: magic (0xAB), byte 1: version (0x01)
  if (merged[0] !== 0xAB || merged[1] !== 0x01) {
    status.textContent = "Bad session header — wrong magic";
    return null;
  }
  const nameLen = (merged[2] << 8) | merged[3];
  const nameBytes = merged.slice(4, 4 + nameLen);
  const filename = new TextDecoder().decode(nameBytes);

  // Decompress the rest with pako
  const compressed = merged.slice(4 + nameLen);
  let raw;
  try {
    raw = pako.inflate(compressed);
  } catch (e) {
    status.textContent = "Decompress error: " + e.message;
    return null;
  }

  return { filename, data: raw };
}

function triggerDownload(file) {
  const blob = new Blob([file.data], { type: "application/octet-stream" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = file.filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  status.textContent = `Downloaded: ${file.filename} (${file.data.length} bytes)`;
}

// ── main loop ────────────────────────────────────────────────────────────
let lastScan = 0;

function loop(ts) {
  if (!running) return;
  animId = requestAnimationFrame(loop);

  if (ts - lastScan < CFG.SCAN_EVERY) return;
  lastScan = ts;

  // Resize processing canvas to match video
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return;
  overlay.width  = vw;
  overlay.height = vh;

  // Draw video frame to canvas
  octx.drawImage(video, 0, 0, vw, vh);
  const imgData = octx.getImageData(0, 0, vw, vh);
  const pixels  = imgData.data;

  const result = decodeFrame(pixels, vw, vh);

  // Draw overlay
  octx.strokeStyle = result ? "#0f0" : "#f44";
  octx.lineWidth = 3;
  const corners = findGridCorners(pixels, vw, vh);
  if (corners) {
    octx.strokeRect(corners.left, corners.top,
                     corners.right - corners.left, corners.bottom - corners.top);
  }

  if (!result) return;

  const { index, total, payload } = result;

  // Init or validate total
  if (totalFrames === null) {
    totalFrames = total;
    status.textContent = `Detected: ${total} frame(s)`;
  } else if (totalFrames !== total) {
    // total mismatch — maybe a different transfer, ignore
    return;
  }

  // Cooldown check
  const now = Date.now();
  if (lastCapture[index] && now - lastCapture[index] < CFG.COOLDOWN) return;
  lastCapture[index] = now;

  // Store
  received[index] = payload;

  // Update progress
  const got = Object.keys(received).length;
  const pct = Math.round((got / totalFrames) * 100);
  bar.style.width = pct + "%";
  frames.textContent = `${got} / ${totalFrames}`;
  sz.textContent = `${Math.round(Object.values(received).reduce((a,b)=>a+b.length,0)/1024)} KB`;
  status.textContent = `Captured frame ${index + 1} of ${totalFrames}`;

  if (got >= totalFrames) {
    status.textContent = "All frames captured — reassembling…";
    running = false;
    cancelAnimationFrame(animId);
    if (stream) { stream.getTracks().forEach(t => t.stop()); }

    const file = reassemble();
    if (file) {
      dlBtn.disabled = false;
      dlBtn.textContent = `Download ${file.filename} (${file.data.length} bytes)`;
      dlBtn.onclick = () => triggerDownload(file);
      status.textContent = "Ready! Tap Download.";
      // Vibrate to notify
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
    }
  }
}

// ── start ────────────────────────────────────────────────────────────────
dlBtn.onclick = () => {
  const file = reassemble();
  if (file) triggerDownload(file);
};

startCamera();
</script>
